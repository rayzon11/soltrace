<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SolTrace — Solana Wallet Activity Feed</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #1a1a24;
    --border: rgba(139,92,246,0.15);
    --border2: rgba(139,92,246,0.3);
    --purple: #8b5cf6;
    --purple-dim: rgba(139,92,246,0.1);
    --green: #10b981;
    --green-dim: rgba(16,185,129,0.1);
    --red: #ef4444;
    --red-dim: rgba(239,68,68,0.1);
    --amber: #f59e0b;
    --amber-dim: rgba(245,158,11,0.1);
    --text: #f1f0ff;
    --text-dim: #888899;
    --text-dimmer: #44445a;
    --mono: 'Space Mono', monospace;
    --sans: 'DM Sans', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: 
      linear-gradient(rgba(139,92,246,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(139,92,246,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 780px;
    margin: 0 auto;
    padding: 2rem 1.5rem 4rem;
    position: relative;
    z-index: 1;
  }

  .header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 2.5rem;
  }

  .logo {
    width: 36px;
    height: 36px;
    background: var(--purple);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--mono);
    font-size: 14px;
    font-weight: 700;
    color: #fff;
    letter-spacing: -1px;
    flex-shrink: 0;
  }

  .header-text h1 { font-size: 20px; font-weight: 600; letter-spacing: -0.5px; }
  .header-text p { font-size: 13px; color: var(--text-dim); margin-top: 1px; }

  .solana-badge {
    margin-left: auto;
    background: var(--purple-dim);
    border: 1px solid var(--border2);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 12px;
    color: var(--purple);
    font-family: var(--mono);
    letter-spacing: 0.5px;
  }

  .search-wrap {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 12px;
    padding: 1.25rem;
    margin-bottom: 1.5rem;
  }

  .search-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text-dim);
    font-family: var(--mono);
    margin-bottom: 10px;
    display: block;
  }

  .search-row { display: flex; gap: 10px; }

  .search-input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
  }

  .search-input::placeholder { color: var(--text-dimmer); }
  .search-input:focus { border-color: var(--purple); }

  .search-btn {
    background: var(--purple);
    border: none;
    border-radius: 8px;
    padding: 10px 20px;
    color: #fff;
    font-family: var(--sans);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    white-space: nowrap;
  }

  .search-btn:hover { opacity: 0.88; }
  .search-btn:active { transform: scale(0.97); }
  .search-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .quick-label { font-size: 11px; color: var(--text-dimmer); margin-top: 10px; display: block; }

  .quick-addresses { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }

  .quick-addr {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 3px 10px;
    font-size: 11px;
    font-family: var(--mono);
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.15s;
  }

  .quick-addr:hover { border-color: var(--purple); color: var(--purple); }

  /* Progress bar */
  .progress-bar-wrap {
    height: 3px;
    background: var(--surface2);
    border-radius: 2px;
    margin-top: 12px;
    overflow: hidden;
    display: none;
  }
  .progress-bar-fill {
    height: 100%;
    background: var(--purple);
    border-radius: 2px;
    transition: width 0.3s ease;
    width: 0%;
  }

  .stats-bar {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 1.5rem;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
  }

  .stat-label {
    font-size: 11px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 1px;
    font-family: var(--mono);
    margin-bottom: 6px;
  }

  .stat-value {
    font-size: 22px;
    font-weight: 600;
    font-family: var(--mono);
    letter-spacing: -1px;
  }

  .stat-value.purple { color: var(--purple); }
  .stat-value.green { color: var(--green); }
  .stat-value.amber { color: var(--amber); }

  .feed-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1rem;
  }

  .feed-title {
    font-size: 13px;
    font-family: var(--mono);
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .feed { display: flex; flex-direction: column; gap: 8px; }

  .tx-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 14px;
    transition: border-color 0.15s, background 0.15s;
    cursor: pointer;
    text-decoration: none;
  }

  .tx-card:hover { border-color: var(--border2); background: var(--surface2); }

  .tx-icon {
    width: 36px;
    height: 36px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
  }

  .tx-icon.send { background: var(--red-dim); color: var(--red); }
  .tx-icon.receive { background: var(--green-dim); color: var(--green); }
  .tx-icon.swap { background: var(--purple-dim); color: var(--purple); }
  .tx-icon.nft { background: var(--amber-dim); color: var(--amber); }
  .tx-icon.contract { background: var(--surface2); color: var(--text-dim); }
  .tx-icon.failed { background: var(--red-dim); color: var(--red); opacity: 0.5; }

  .tx-body { flex: 1; min-width: 0; }

  .tx-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    margin-bottom: 4px;
  }

  .tx-type { font-size: 13px; font-weight: 600; color: var(--text); }

  .tx-amount {
    font-family: var(--mono);
    font-size: 14px;
    font-weight: 700;
    flex-shrink: 0;
  }

  .tx-amount.positive { color: var(--green); }
  .tx-amount.negative { color: var(--red); }
  .tx-amount.neutral { color: var(--text-dim); }

  .tx-bottom {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }

  .tx-sig {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dimmer);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .tx-time { font-size: 11px; color: var(--text-dimmer); flex-shrink: 0; font-family: var(--mono); }

  .tx-status {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--green);
    flex-shrink: 0;
    box-shadow: 0 0 6px var(--green);
  }

  .tx-status.failed { background: var(--red); box-shadow: 0 0 6px var(--red); }

  .state-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 3rem 2rem;
    text-align: center;
  }

  .state-icon { font-size: 40px; margin-bottom: 1rem; display: block; }
  .state-title { font-size: 16px; font-weight: 600; margin-bottom: 8px; }
  .state-sub { font-size: 14px; color: var(--text-dim); line-height: 1.6; }

  .spinner {
    width: 28px;
    height: 28px;
    border: 2px solid var(--border2);
    border-top-color: var(--purple);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin: 0 auto 1rem;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .share-btn {
    background: transparent;
    border: 1px solid var(--border2);
    border-radius: 8px;
    padding: 6px 14px;
    color: var(--purple);
    font-size: 13px;
    font-family: var(--sans);
    cursor: pointer;
    transition: all 0.15s;
  }

  .share-btn:hover { background: var(--purple-dim); }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .tx-card { animation: fadeUp 0.3s ease forwards; opacity: 0; }

  .filter-tabs { display: flex; gap: 6px; margin-bottom: 1rem; flex-wrap: wrap; }

  .filter-tab {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 14px;
    font-size: 12px;
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.15s;
    font-family: var(--sans);
  }

  .filter-tab.active, .filter-tab:hover {
    background: var(--purple-dim);
    border-color: var(--purple);
    color: var(--purple);
  }

  .wallet-display {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-dim);
    background: var(--surface2);
    border-radius: 6px;
    padding: 3px 10px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    max-width: 220px;
  }

  .rpc-note {
    font-size: 11px;
    color: var(--text-dimmer);
    font-family: var(--mono);
    text-align: center;
    margin-top: 8px;
  }

  @media (max-width: 600px) {
    .stats-bar { grid-template-columns: repeat(2, 1fr); }
    .search-row { flex-direction: column; }
    .search-btn { width: 100%; }
  }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="logo">ST</div>
    <div class="header-text">
      <h1>SolTrace</h1>
      <p>Solana wallet activity feed</p>
    </div>
    <div class="solana-badge">MAINNET</div>
  </div>

  <div class="search-wrap">
    <span class="search-label">Wallet Address</span>
    <div class="search-row">
      <input 
        class="search-input" 
        id="walletInput"
        type="text" 
        placeholder="Enter Solana wallet address..."
        autocomplete="off"
        spellcheck="false"
      />
      <button class="search-btn" id="searchBtn" onclick="loadWallet()">Trace</button>
    </div>
    <div class="progress-bar-wrap" id="progressWrap">
      <div class="progress-bar-fill" id="progressFill"></div>
    </div>
    <span class="quick-label">Try a known wallet:</span>
    <div class="quick-addresses">
      <span class="quick-addr" onclick="useAddr('9WzDXwBbmkg8ZTbNMqUxvQRAyrZzDsGYdLVL9zYtAWWM')">Binance Hot</span>
      <span class="quick-addr" onclick="useAddr('5tzFkiKscXHK5ky9tPFdzym2nYoa9pMTGgqCzxHEvSYa')">FTX Wallet</span>
      <span class="quick-addr" onclick="useAddr('GThUX1Atko4tqhN2NaiTazWSeFWMuiUvfFnyJyUghFMJ')">Solana Foundation</span>
    </div>
  </div>

  <div id="statsBar" class="stats-bar" style="display:none">
    <div class="stat-card">
      <div class="stat-label">Transactions</div>
      <div class="stat-value purple" id="statTx">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">SOL In</div>
      <div class="stat-value green" id="statIn">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">SOL Out</div>
      <div class="stat-value amber" id="statOut">—</div>
    </div>
  </div>

  <div id="feedWrap">
    <div class="state-box">
      <span class="state-icon">◎</span>
      <div class="state-title">Enter a wallet address</div>
      <div class="state-sub">Paste any Solana wallet address above<br>to see its recent transaction history</div>
    </div>
  </div>

</div>

<script>
// ── RPC endpoints — tries each in order if one fails or rate-limits ──
const RPCS = [
  'https://api.mainnet-beta.solana.com',
  'https://solana-mainnet.rpc.extrnode.com',
  'https://rpc.ankr.com/solana',
];

let currentRpcIdx = 0;
let currentFilter = 'all';
let allTxs = [];
let currentWallet = '';

// ── Helpers ──────────────────────────────────────────────────────────

function useAddr(addr) {
  document.getElementById('walletInput').value = addr;
  loadWallet();
}

function shortSig(sig) {
  if (!sig) return '—';
  return sig.slice(0, 8) + '…' + sig.slice(-6);
}

function timeAgo(ts) {
  if (!ts) return '—';
  const diff = Date.now() / 1000 - ts;
  if (diff < 60) return Math.floor(diff) + 's ago';
  if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
  if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
  return Math.floor(diff / 86400) + 'd ago';
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// ── RPC call with retry + automatic fallback ──────────────────────────

async function rpcCall(method, params, retries = 3) {
  for (let attempt = 0; attempt < retries; attempt++) {
    const rpc = RPCS[currentRpcIdx % RPCS.length];
    try {
      const res = await fetch(rpc, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ jsonrpc: '2.0', id: 1, method, params }),
      });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      if (data.error) {
        // Rate limited or method error — rotate RPC
        if (data.error.code === 429 || data.error.message?.includes('rate')) {
          currentRpcIdx++;
          await sleep(400);
          continue;
        }
        throw new Error(data.error.message || JSON.stringify(data.error));
      }
      return data.result;
    } catch (err) {
      if (attempt < retries - 1) {
        currentRpcIdx++;
        await sleep(300 * (attempt + 1));
      } else {
        throw err;
      }
    }
  }
}

// ── Fetch transactions with concurrency control ───────────────────────

async function fetchTransactions(signatures, onProgress) {
  const BATCH = 4;        // max concurrent requests
  const DELAY = 120;      // ms between batches (rate limit friendly)
  const results = [];
  let done = 0;

  for (let i = 0; i < signatures.length; i += BATCH) {
    const batch = signatures.slice(i, i + BATCH);
    const batchResults = await Promise.all(
      batch.map(sig =>
        rpcCall('getTransaction', [
          sig,
          { encoding: 'json', maxSupportedTransactionVersion: 0 }
        ]).catch(() => null)
      )
    );
    results.push(...batchResults);
    done += batch.length;
    onProgress(done / signatures.length);
    if (i + BATCH < signatures.length) await sleep(DELAY);
  }

  return results;
}

// ── Account key extraction — handles both legacy & v0 transactions ────

function getAccountKeys(tx) {
  const msg = tx.transaction?.message;
  if (!msg) return [];

  // Legacy: accountKeys is string[]
  // v0 parsed: accountKeys is {pubkey, signer, writable}[] OR string[]
  // Also check staticAccountKeys for some RPC encodings
  const rawKeys = msg.accountKeys || msg.staticAccountKeys || [];

  const staticKeys = rawKeys.map(k => (typeof k === 'string' ? k : k.pubkey));

  // v0 may also have loadedAddresses (writable + readonly) from address lookup tables
  const loaded = tx.meta?.loadedAddresses;
  const loadedWritable = loaded?.writable || [];
  const loadedReadonly = loaded?.readonly || [];

  return [...staticKeys, ...loadedWritable, ...loadedReadonly];
}

// ── Transaction classification ────────────────────────────────────────

function classifyTx(tx, wallet) {
  const meta = tx.meta;

  // Failed transaction
  if (meta?.err !== null && meta?.err !== undefined && meta?.err !== null) {
    return { type: 'failed', label: 'Failed Tx', amount: 0 };
  }

  const accountKeys = getAccountKeys(tx);
  const walletIdx = accountKeys.findIndex(k => k === wallet);

  let solChange = 0;
  if (walletIdx >= 0 && meta?.preBalances && meta?.postBalances) {
    solChange = (meta.postBalances[walletIdx] - meta.preBalances[walletIdx]) / 1e9;
  }

  const logs = meta?.logMessages || [];
  const logsStr = logs.join(' ').toLowerCase();

  const isSwap = logsStr.includes('swap') || logsStr.includes('amm') || logsStr.includes('orca') || logsStr.includes('raydium');
  const isNFT = logsStr.includes('nft') || logsStr.includes('metaplex') || logsStr.includes('metadata') || logsStr.includes('master edition');

  if (isNFT) return { type: 'nft', label: 'NFT Activity', amount: solChange };
  if (isSwap) return { type: 'swap', label: 'Token Swap', amount: solChange };
  if (solChange > 0.000005) return { type: 'receive', label: 'Received SOL', amount: solChange };
  if (solChange < -0.000005) return { type: 'send', label: 'Sent SOL', amount: solChange };
  return { type: 'contract', label: 'Program Call', amount: solChange };
}

const typeIcon = {
  send: '↑',
  receive: '↓',
  swap: '⇄',
  nft: '◈',
  contract: '⬡',
  failed: '✕',
};

// ── Render a single transaction card ──────────────────────────────────

function renderTx(tx, wallet, idx) {
  const sig = tx.transaction?.signatures?.[0] || '';
  const ts = tx.blockTime || 0;
  const { type, label, amount } = classifyTx(tx, wallet);

  const amountStr = (Math.abs(amount) > 0.000005)
    ? (amount >= 0 ? '+' : '') + amount.toFixed(5) + ' SOL'
    : '—';
  const amountClass = amount > 0.000005 ? 'positive' : amount < -0.000005 ? 'negative' : 'neutral';
  const failed = type === 'failed';

  return `
    <a class="tx-card" href="https://solscan.io/tx/${sig}" target="_blank" rel="noopener"
       style="animation-delay:${idx * 35}ms" data-type="${type}">
      <div class="tx-icon ${type}">${typeIcon[type]}</div>
      <div class="tx-body">
        <div class="tx-top">
          <span class="tx-type">${label}</span>
          <span class="tx-amount ${amountClass}">${amountStr}</span>
        </div>
        <div class="tx-bottom">
          <span class="tx-sig">${shortSig(sig)}</span>
          <span class="tx-time">${timeAgo(ts)}</span>
        </div>
      </div>
      <div class="tx-status ${failed ? 'failed' : ''}"></div>
    </a>
  `;
}

// ── Render filter tabs ─────────────────────────────────────────────────

function renderFilterTabs() {
  const filters = [
    { key: 'all', label: 'All' },
    { key: 'receive', label: 'Received' },
    { key: 'send', label: 'Sent' },
    { key: 'swap', label: 'Swaps' },
    { key: 'nft', label: 'NFTs' },
    { key: 'contract', label: 'Programs' },
    { key: 'failed', label: 'Failed' },
  ];
  return filters.map(f =>
    `<button class="filter-tab ${currentFilter === f.key ? 'active' : ''}" data-filter="${f.key}">${f.label}</button>`
  ).join('');
}

// ── Render the full feed ───────────────────────────────────────────────

function renderFeed(txs, wallet) {
  const filtered = currentFilter === 'all'
    ? txs
    : txs.filter(tx => classifyTx(tx, wallet).type === currentFilter);

  const feedWrap = document.getElementById('feedWrap');

  // Update stats (always from full set)
  let solIn = 0, solOut = 0;
  txs.forEach(tx => {
    const { amount, type } = classifyTx(tx, wallet);
    if (type !== 'failed') {
      if (amount > 0) solIn += amount;
      if (amount < 0) solOut += Math.abs(amount);
    }
  });

  document.getElementById('statTx').textContent = txs.length;
  document.getElementById('statIn').textContent = '+' + solIn.toFixed(4);
  document.getElementById('statOut').textContent = '-' + solOut.toFixed(4);
  document.getElementById('statsBar').style.display = 'grid';

  if (filtered.length === 0) {
    feedWrap.innerHTML = `
      <div class="filter-tabs">${renderFilterTabs()}</div>
      <div class="state-box">
        <span class="state-icon">○</span>
        <div class="state-title">No transactions found</div>
        <div class="state-sub">No ${currentFilter} transactions in recent history</div>
      </div>`;
    attachFilterListeners(wallet);
    return;
  }

  feedWrap.innerHTML = `
    <div class="feed-header">
      <span class="feed-title">Activity Feed</span>
      <div style="display:flex;align-items:center;gap:10px">
        <div class="wallet-display">${wallet.slice(0,8)}…${wallet.slice(-8)}</div>
        <button class="share-btn" onclick="shareWallet('${wallet}')">Share ↗</button>
      </div>
    </div>
    <div class="filter-tabs">${renderFilterTabs()}</div>
    <div class="feed" id="feed">
      ${filtered.map((tx, i) => renderTx(tx, wallet, i)).join('')}
    </div>
    <div style="text-align:center;margin-top:1.5rem">
      <a href="https://solscan.io/account/${wallet}" target="_blank" rel="noopener"
         style="font-size:13px;color:var(--purple);text-decoration:none;font-family:var(--mono)">
        View full history on Solscan →
      </a>
    </div>
    <div class="rpc-note">Using RPC: ${RPCS[currentRpcIdx % RPCS.length].replace('https://', '')}</div>
  `;

  attachFilterListeners(wallet);
}

function attachFilterListeners(wallet) {
  document.querySelectorAll('.filter-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      currentFilter = tab.dataset.filter;
      renderFeed(allTxs, wallet);
    });
  });
}

// ── Share ──────────────────────────────────────────────────────────────

function shareWallet(wallet) {
  const url = window.location.origin + window.location.pathname + '?wallet=' + wallet;
  const text = `Tracing Solana wallet ${wallet.slice(0,8)}… on SolTrace`;
  const twitterUrl = `https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}&url=${encodeURIComponent(url)}`;
  window.open(twitterUrl, '_blank');
}

// ── Main load function ─────────────────────────────────────────────────

async function loadWallet() {
  const wallet = document.getElementById('walletInput').value.trim();
  if (!wallet || wallet.length < 32) {
    alert('Please enter a valid Solana wallet address (32–44 characters)');
    return;
  }

  currentWallet = wallet;
  currentFilter = 'all';
  allTxs = [];

  const btn = document.getElementById('searchBtn');
  const progressWrap = document.getElementById('progressWrap');
  const progressFill = document.getElementById('progressFill');

  btn.disabled = true;
  btn.textContent = 'Loading…';
  document.getElementById('statsBar').style.display = 'none';
  progressWrap.style.display = 'block';
  progressFill.style.width = '5%';

  document.getElementById('feedWrap').innerHTML = `
    <div class="state-box">
      <div class="spinner"></div>
      <div class="state-title">Fetching signatures…</div>
      <div class="state-sub" style="font-family:var(--mono);font-size:12px">${wallet.slice(0,16)}…</div>
    </div>
  `;

  try {
    // Step 1: get signatures
    const sigs = await rpcCall('getSignaturesForAddress', [wallet, { limit: 25 }]);

    if (!sigs || sigs.length === 0) {
      document.getElementById('feedWrap').innerHTML = `
        <div class="state-box">
          <span class="state-icon">○</span>
          <div class="state-title">No transactions found</div>
          <div class="state-sub">This wallet has no recent activity on mainnet</div>
        </div>`;
      return;
    }

    progressFill.style.width = '15%';

    // Update status
    document.getElementById('feedWrap').innerHTML = `
      <div class="state-box">
        <div class="spinner"></div>
        <div class="state-title">Loading ${sigs.length} transactions…</div>
        <div class="state-sub" style="font-family:var(--mono);font-size:12px">Fetching in small batches to avoid rate limits</div>
      </div>
    `;

    // Step 2: fetch each transaction individually (the correct API!)
    const signatures = sigs.map(s => s.signature);
    const txResults = await fetchTransactions(signatures, (progress) => {
      progressFill.style.width = (15 + progress * 80) + '%';
    });

    allTxs = txResults.filter(Boolean);
    progressFill.style.width = '100%';

    if (allTxs.length === 0) {
      document.getElementById('feedWrap').innerHTML = `
        <div class="state-box">
          <span class="state-icon">○</span>
          <div class="state-title">Could not load transactions</div>
          <div class="state-sub">RPC returned empty results. Try again in a moment, or the wallet may have only very old transactions.</div>
        </div>`;
      return;
    }

    renderFeed(allTxs, wallet);

  } catch (err) {
    document.getElementById('feedWrap').innerHTML = `
      <div class="state-box">
        <span class="state-icon">!</span>
        <div class="state-title">RPC Error</div>
        <div class="state-sub">
          Could not reach Solana RPC.<br>
          Check your connection and try again.<br><br>
          <small style="font-family:var(--mono);color:var(--text-dimmer)">${err.message}</small>
        </div>
      </div>`;
  } finally {
    btn.disabled = false;
    btn.textContent = 'Trace';
    setTimeout(() => { progressWrap.style.display = 'none'; progressFill.style.width = '0%'; }, 600);
  }
}

// ── URL param support ──────────────────────────────────────────────────
const urlParams = new URLSearchParams(window.location.search);
const walletParam = urlParams.get('wallet');
if (walletParam) {
  document.getElementById('walletInput').value = walletParam;
  loadWallet();
}

document.getElementById('walletInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') loadWallet();
});
</script>
